apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: novanet
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >-
      agent=ghcr.io/piwi3910/novanet/novanet-agent,
      dataplane=ghcr.io/piwi3910/novanet/novanet-dataplane
    argocd-image-updater.argoproj.io/agent.update-strategy: semver
    argocd-image-updater.argoproj.io/dataplane.update-strategy: semver
    argocd-image-updater.argoproj.io/agent.helm.image-name: image.agent.repository
    argocd-image-updater.argoproj.io/agent.helm.image-tag: image.agent.tag
    argocd-image-updater.argoproj.io/dataplane.helm.image-name: image.dataplane.repository
    argocd-image-updater.argoproj.io/dataplane.helm.image-tag: image.dataplane.tag
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/piwi3910/novanet
    path: deploy/helm/novanet
    targetRevision: main
    helm:
      releaseName: novanet
      valuesObject:
        image:
          agent:
            repository: ghcr.io/piwi3910/novanet/novanet-agent
            tag: v1.7.0
          dataplane:
            repository: ghcr.io/piwi3910/novanet/novanet-dataplane
            tag: v1.7.0
        l4lb:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: novanet-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
